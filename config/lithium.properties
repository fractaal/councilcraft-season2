# Lithium config — force-enable optimizations that Sable tries to disable.
# Sable disables these because its physics system needs real chunk data,
# but Lithium's chunk_access safety prevents the sync-chunk-load-on-tick
# bug that ALL mods doing `getBlockState` on unloaded chunks trigger
# (Iron's Spellbooks, Twilight Forest Travellers Gear, Sable itself).
#
# If Sable crashes with these on, revert by deleting this file.
mixin.world.chunk_access=true
mixin.world.chunk_ticking=true
mixin.world.tick_scheduler=true
mixin.entity.collisions.unpushable_cramming=true
